# ================================
# OInsist 后台管理系统 - 应用配置
# ================================
# 配置文件设计说明：
# Spring Boot 采用"约定优于配置"的理念，大部分参数都有合理的默认值。
# 这里只显式声明那些"需要覆盖默认值"或"对运维可见性很重要"的配置项。
# 不要将所有可配置项都列出来——那样会变成一份冗长的"配置百科"，反而降低可读性。

server:
  # 应用端口：默认 8080，显式声明是为了让团队成员和运维一眼看到端口号，
  # 避免本地开发时与其他服务端口冲突时还需要去翻 Spring Boot 默认值文档。
  port: 8080

spring:
  application:
    # 应用名称：会出现在日志、Actuator、服务注册中心等多处，
    # 是微服务/单体应用的"身份标识"，建议与 Maven artifactId 保持语义一致。
    name: oinsist-admin
  profiles:
    # 激活 dev Profile，使 @Profile("dev") 标注的测试 Controller 等组件生效。
    # 生产部署时通过启动参数 --spring.profiles.active=prod 覆盖即可。
    active: dev

  # ==================== 数据源配置 ====================
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/oinsist
    username: postgres
    password: postgres

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  # Mapper XML 文件路径（支持多模块扫描）
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      # 主键策略：雪花算法（分布式唯一ID，不依赖数据库自增）
      id-type: assign_id
      # 逻辑删除字段名（与 BaseEntity.deleted 对应）
      logic-delete-field: deleted
      # 逻辑删除值（1=已删除）
      logic-delete-value: 1
      # 逻辑未删除值（0=未删除）
      logic-not-delete-value: 0
  configuration:
    # 开启驼峰命名映射（数据库下划线 -> Java驼峰）
    map-underscore-to-camel-case: true

